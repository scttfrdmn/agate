# CI — matches the checks CONTRIBUTING.md promises. One job per toolchain so a failure
# points at the right stack. No AWS credentials are used: unit tests mock boto3 and
# `cdk synth` runs offline (no bootstrap, no deploy).
name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (a new push to a PR supersedes the old one).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python:
    name: Python (ruff + pytest + coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - run: uv sync
      - name: Lint
        run: uv run ruff check
      - name: Format check
        run: uv run ruff format --check
      - name: Tests (with the >=60% coverage gate)
        run: uv run pytest

  web:
    name: Web SPA (typecheck + vitest + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      # Skip the ~17 MB pyodide wheel download in CI — the build only needs a
      # type-checkable, buildable tree, not a deployable one.
      - name: Build
        run: npm run build
        env:
          AGATE_SKIP_WHEELS: "1"

  iac:
    name: IaC (cdk synth)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - run: uv sync
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci # the repo-pinned aws-cdk CLI (schema-compatible with aws-cdk-lib)
      - name: Synth (offline; no AWS creds needed)
        run: npm run synth

  go:
    name: Go CLI (gofmt + vet + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: gofmt (must be clean)
        run: test -z "$(gofmt -l ./cli)"
      - run: go vet ./cli/...
      - run: go test ./cli/...
